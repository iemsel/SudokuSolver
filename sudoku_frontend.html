<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Sudoku Solver</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.3em; }
        .subtitle { opacity: 0.9; margin-top: 8px; }

        .board {
            display: grid;
            grid-template-columns: repeat(9, 52px);
            gap: 3px;
            background: #2c3e50;
            padding: 12px;
            margin: 30px auto;
            width: fit-content;
            border: 5px solid #2c3e50;
        }
        input {
            width: 52px;
            height: 52px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            border: 1px solid #ddd;
            background: white;
        }
        input:focus {
            outline: 3px solid #3498db;
            background: #f0f8ff;
        }

        /* Strong 3x3 block borders */
        input:nth-child(3n):not(:nth-child(9n)) {
            border-right: 4px solid #2c3e50 !important;
        }
        input:nth-child(6n):not(:nth-child(9n)) {
            border-right: 4px solid #2c3e50 !important;
        }
        .board input:nth-child(n+19):nth-child(-n+27),
        .board input:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 4px solid #2c3e50 !important;
        }

        .controls {
            text-align: center;
            padding: 25px;
        }
        button {
            padding: 14px 28px;
            margin: 0 8px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-solve { background: #27ae60; color: white; }
        .btn-solve:hover { background: #219653; }
        .btn-clear { background: #e74c3c; color: white; }
        .btn-clear:hover { background: #c0392b; }
        .btn-example { background: #3498db; color: white; }
        .btn-example:hover { background: #2980b9; }

        .status {
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
            min-height: 28px;
            font-size: 1.1em;
        }
        .loading { color: #f39c12; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }

        .solution-info {
            background: #f8f9fa;
            padding: 18px;
            margin: 20px;
            border-radius: 10px;
            font-size: 1em;
            border-left: 5px solid #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☁️ Azure Sudoku Solver</h1>
            <p class="subtitle">Solve puzzles with Azure Functions + Blob Storage</p>
        </header>

        <div class="board" id="board"></div>

        <div class="controls">
            <button class="btn-example" onclick="loadExample()">Load Example</button>
            <button class="btn-solve" onclick="solvePuzzle()">Solve Puzzle</button>
            <button class="btn-clear" onclick="clearBoard()">Clear Board</button>
        </div>

        <div class="status" id="status"></div>
        <div class="solution-info" id="solutionInfo" style="display:none;"></div>
    </div>

    <script>
        const apiUrl = 'https://sudokusolverfa-hcbwg0hfhgaabedr.spaincentral-01.azurewebsites.net/api/solve';

        let boardInputs = [];

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            boardInputs = [];

            for (let i = 0; i < 81; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.oninput = function() {
                    if (this.value && !/^[1-9]$/.test(this.value)) this.value = '';
                };
                boardEl.appendChild(input);
                boardInputs.push(input);
            }
        }

        function getBoard() {
            const board = [];
            for (let i = 0; i < 9; i++) {
                const row = [];
                for (let j = 0; j < 9; j++) {
                    const val = boardInputs[i*9 + j].value.trim();
                    row.push(val ? parseInt(val) : 0);
                }
                board.push(row);
            }
            return board;
        }

        function setBoard(board) {
            for (let i = 0; i < 81; i++) {
                const val = board[Math.floor(i/9)][i % 9];
                boardInputs[i].value = (val !== 0) ? val : '';
            }
        }

        async function solvePuzzle() {
            const status = document.getElementById('status');
            const solutionInfo = document.getElementById('solutionInfo');
            
            status.textContent = "Solving in Azure...";
            status.className = "status loading";
            solutionInfo.style.display = "none";

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ board: getBoard() })
                });

                const data = await response.json();

                if (response.ok) {
                    setBoard(data.solution);
                    status.textContent = "✅ Puzzle Solved Successfully!";
                    status.className = "status success";
                    
                    solutionInfo.innerHTML = `<strong>✅ Solution saved to Azure Blob Storage!</strong><br>${data.info || 'Check sudoku-solutions container in your Storage Account'}`;
                    solutionInfo.style.display = "block";
                } else {
                    status.textContent = "❌ " + (data.error || "Could not solve puzzle");
                    status.className = "status error";
                }
            } catch (err) {
                status.textContent = "❌ Could not connect to Azure Function";
                status.className = "status error";
                console.error(err);
            }
        }

        function loadExample() {
            const example = [
                [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
                [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
                [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
            ];
            setBoard(example);
            document.getElementById('status').textContent = "Example puzzle loaded ✓";
        }

        function clearBoard() {
            boardInputs.forEach(input => input.value = '');
            document.getElementById('status').textContent = '';
            document.getElementById('solutionInfo').style.display = 'none';
        }

        window.onload = createBoard;
    </script>
</body>
</html>
