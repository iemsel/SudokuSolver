<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Sudoku Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 40px 20px; 
        }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 30px; }
        
        /* 9x9 CSS Grid for Sudoku */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(9, 45px); 
            grid-template-rows: repeat(9, 45px); 
            gap: 1px; 
            background-color: #333; 
            border: 3px solid #333; 
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .cell { 
            width: 100%; 
            height: 100%; 
            text-align: center; 
            font-size: 22px; 
            font-weight: 600;
            border: none; 
            outline: none; 
            background-color: #fff; 
            color: #333;
            box-sizing: border-box;
        }
        
        /* Thicker borders for the 3x3 sub-grids */
        .cell:nth-child(3n) { border-right: 2px solid #333; }
        .cell:nth-child(9n) { border-right: none; } /* Override for the last column */
        
        .grid > input:nth-child(n+19):nth-child(-n+27),
        .grid > input:nth-child(n+46):nth-child(-n+54) { 
            border-bottom: 2px solid #333; 
        }

        .cell:focus { background-color: #e3f2fd; }
        
        .button-container { margin-top: 30px; }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: 600;
            background-color: #0078D4; /* Azure Blue */
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: background-color 0.2s;
        }
        button:hover { background-color: #005A9E; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #status { 
            margin-top: 20px; 
            font-weight: 600; 
            color: #0078D4; 
            min-height: 24px;
        }
        
        .user-input { color: #0078D4; } /* Different color for solved numbers */
    </style>
</head>
<body>

    <h1>Azure Sudoku Solver</h1>
    <p>Fill in the puzzle and let the cloud compute the solution.</p>

    <div class="grid" id="sudoku-grid">
        <!-- 81 inputs will be generated by JavaScript here -->
    </div>

    <div class="button-container">
        <button id="solve-btn" onclick="solveSudoku()">Solve Puzzle</button>
        <button onclick="clearBoard()" style="background-color: #e0e0e0; color: #333; margin-left: 10px;">Clear</button>
    </div>
    
    <div id="status"></div>

    <script>
        const grid = document.getElementById('sudoku-grid');
        
        // Generate the 81 input cells dynamically
        for (let i = 0; i < 81; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'cell';
            input.id = `cell-${i}`;
            
            // Only allow numbers 1-9
            input.oninput = function() { 
                this.value = this.value.replace(/[^1-9]/g, ''); 
            };
            grid.appendChild(input);
        }

        function clearBoard() {
            for (let i = 0; i < 81; i++) {
                const cell = document.getElementById(`cell-${i}`);
                cell.value = '';
                cell.style.backgroundColor = '#fff';
                cell.classList.remove('user-input');
            }
            document.getElementById('status').innerText = "";
        }

        async function solveSudoku() {
            const statusText = document.getElementById('status');
            const solveBtn = document.getElementById('solve-btn');
            
            statusText.innerText = "Sending puzzle to Azure Function...";
            statusText.style.color = "#333";
            solveBtn.disabled = true;
            
            // 1. Read the grid into a 9x9 2D array
            let board = [];
            for (let r = 0; r < 9; r++) {
                let row = [];
                for (let c = 0; c < 9; c++) {
                    let val = document.getElementById(`cell-${r * 9 + c}`).value;
                    row.push(val ? parseInt(val) : 0);
                    
                    // Mark inputs the user originally typed to differentiate from the solution
                    if (val) {
                        document.getElementById(`cell-${r * 9 + c}`).classList.add('user-input');
                    }
                }
                board.push(row);
            }

            try {
                const apiUrl = 'http://localhost:7071/api/solve'; 
                
                // 2. Send HTTP POST request to the Azure Function
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ board: board })
                });

                const data = await response.json();

                // 3. Handle the response
                if (response.ok) {
                    statusText.innerText = "Puzzle Solved! Saved to Blob: " + (data.blob_file || "success");
                    statusText.style.color = "#107c10"; // Success green
                    
                    // Populate the UI with the solved numbers
                    for (let r = 0; r < 9; r++) {
                        for (let c = 0; c < 9; c++) {
                            const cell = document.getElementById(`cell-${r * 9 + c}`);
                            cell.value = data.solution[r][c];
                            
                            // Highlight the newly filled numbers
                            if (!cell.classList.contains('user-input')) {
                                cell.style.backgroundColor = '#e6ffed';
                            }
                        }
                    }
                } else {
                    statusText.innerText = "Error: " + data.error;
                    statusText.style.color = "#d13438"; // Error red
                }
            } catch (err) {
                statusText.innerText = "Request failed. Is the Azure Function running locally?";
                statusText.style.color = "#d13438";
                console.error(err);
            } finally {
                solveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
